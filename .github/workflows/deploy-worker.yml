name: Deploy ChittyRegistry Worker

on:
  push:
    branches:
      - main
    paths:
      - 'src/universal-registry-worker.js'
      - 'wrangler.toml'
      - 'wrangler.jsonc'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

jobs:
  validate:
    name: Validate Worker Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install --prefix /tmp/wrangler-cli wrangler

      - name: Validate wrangler configuration
        run: /tmp/wrangler-cli/node_modules/.bin/wrangler deploy --dry-run --outdir=./dist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Check worker syntax
        run: node -c src/universal-registry-worker.js

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://chittyregistry-staging.chitty.workers.dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install --prefix /tmp/wrangler-cli wrangler

      - name: Deploy to Cloudflare Workers (Staging)
        run: /tmp/wrangler-cli/node_modules/.bin/wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Health check (Staging)
        run: |
          sleep 5
          response=$(curl -s https://chittyregistry-staging.chitty.workers.dev/health)
          echo "Health check response: $response"
          echo "$response" | jq -e '.status == "ok"'

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [validate, deploy-staging]
    if: always() && needs.validate.result == 'success' && (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped')
    environment:
      name: production
      url: https://registry.chitty.cc
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install --prefix /tmp/wrangler-cli wrangler

      - name: Deploy to Cloudflare Workers (Production)
        run: /tmp/wrangler-cli/node_modules/.bin/wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Health check (Production)
        run: |
          sleep 5
          response=$(curl -s https://registry.chitty.cc/health)
          echo "Health check response: $response"
          echo "$response" | jq -e '.status == "ok"'

      - name: Verify route configuration
        run: |
          response=$(curl -s -H "Host: registry.chitty.cc" https://registry.chitty.cc/health)
          echo "$response" | jq -e '.service == "chittyregistry-universal"'

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure()
    steps:
      - name: Notify rollback required
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '⚠️ Production deployment failed. Manual rollback may be required.\n\nRun: `wrangler rollback --env production`'
            })
